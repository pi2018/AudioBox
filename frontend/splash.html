<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1">
<title>AudioBox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:-apple-system,sans-serif}
.splash{display:flex;flex-direction:column;align-items:center;gap:24px}
.logo-circle{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#7c6af7,#a599ff);display:flex;align-items:center;justify-content:center;position:relative;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 40px rgba(124,106,247,0.4)}
@keyframes pulse{0%,100%{box-shadow:0 0 30px rgba(124,106,247,0.4);transform:scale(1)}50%{box-shadow:0 0 70px rgba(124,106,247,0.7);transform:scale(1.05)}}
.logo-icon{font-size:50px}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(124,106,247,0.3);animation:ripple 2.5s ease-out infinite}
.ring-1{width:140px;height:140px;animation-delay:0s}
.ring-2{width:175px;height:175px;animation-delay:.6s}
.ring-3{width:210px;height:210px;animation-delay:1.2s}
@keyframes ripple{0%{opacity:.7;transform:scale(.85)}100%{opacity:0;transform:scale(1.15)}}
.logo-text{font-size:36px;font-weight:700;letter-spacing:8px;background:linear-gradient(90deg,#7c6af7,#ffffff,#a599ff,#7c6af7);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shine 3s linear infinite;text-transform:uppercase}
@keyframes shine{0%{background-position:0% center}100%{background-position:300% center}}
.logo-sub{font-size:12px;letter-spacing:4px;color:#404060;text-transform:uppercase;animation:fadeIn 1.2s ease .5s both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.waves{display:flex;align-items:center;gap:5px;height:40px}
.wave-bar{width:5px;border-radius:3px;background:linear-gradient(to top,#534AB7,#a599ff);animation:wave 1.2s ease-in-out infinite}
.wave-bar:nth-child(1){height:8px;animation-delay:0s}
.wave-bar:nth-child(2){height:18px;animation-delay:.15s}
.wave-bar:nth-child(3){height:28px;animation-delay:.3s}
.wave-bar:nth-child(4){height:40px;animation-delay:.45s}
.wave-bar:nth-child(5){height:28px;animation-delay:.6s}
.wave-bar:nth-child(6){height:18px;animation-delay:.75s}
.wave-bar:nth-child(7){height:8px;animation-delay:.9s}
@keyframes wave{0%,100%{transform:scaleY(.3);opacity:.4}50%{transform:scaleY(1);opacity:1}}
.loading-wrap{width:220px}
.loading-bar{height:3px;background:rgba(124,106,247,0.15);border-radius:2px;overflow:hidden}
.loading-fill{height:100%;width:0%;background:linear-gradient(90deg,#534AB7,#a599ff);border-radius:2px;animation:load 4s ease-in-out forwards}
@keyframes load{0%{width:0%}20%{width:30%}50%{width:65%}80%{width:88%}100%{width:100%}}
.loading-text{font-size:10px;color:#303050;letter-spacing:3px;text-align:center;margin-top:10px;text-transform:uppercase;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:.8}}
</style>
</head>
<body>
<div class="splash">
  <div class="logo-circle">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="logo-icon">🎵</div>
  </div>
  <div class="logo-text">AudioBox</div>
  <div class="logo-sub">Home Audio System</div>
  <div class="waves">
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>
  <div class="loading-wrap">
    <div class="loading-bar"><div class="loading-fill"></div></div>
    <div class="loading-text">Chargement...</div>
  </div>
</div>
<script>
async function waitForBackend() {
  while(true) {
    try {
      const r = await fetch('http://localhost:8000/api/player/status');
      if(r.ok) {
        // Vérifier si c'est le premier démarrage (ABS non configuré)
        try {
          const s = await fetch('http://localhost:8000/api/settings/setup-info');
          if(s.ok) {
            const data = await s.json();
            if(!data.configured) {
              // Premier démarrage : afficher la page setup
              window.location.href = 'http://localhost:8000/setup.html';
              return;
            }
          }
        } catch(e) {}
        // Déjà configuré : interface normale
        window.location.href = 'http://localhost:8000';
        return;
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 1500));
  }
}
setTimeout(waitForBackend, 2000);
</script>
</body>
</html>
